<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Power Key Heroes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <header>
      <h1>🚨 Owen Power Key Heroes 🚨</h1>
      <p>파워키를 장착하고 사건 현장으로 출동!</p>
    </header>

    <section id="ageScreen" class="screen active">
      <h2>난이도를 선택하세요</h2>
      <div class="button-row">
        <button onclick="selectAge(5)">5세</button>
        <button onclick="selectAge(6)">6세</button>
        <button onclick="selectAge(7)">7세</button>
      </div>
    </section>

    <section id="garageScreen" class="screen">
      <h2>출동 차량 선택</h2>
      <div id="carList" class="car-grid"></div>
    </section>

    <section id="keyScreen" class="screen">
      <div class="top-info">
        <button onclick="showScreen('garageScreen')">← 차고</button>
        <div>⭐ 점수: <span id="score1">0</span></div>
      </div>

      <h2 id="selectedCarName"></h2>
      <div id="selectedCarView"></div>

      <h3>파워키 색상을 선택하세요</h3>
      <div id="keyList" class="key-grid"></div>

      <button id="attachBtn" class="hidden" onclick="attachKey()">파워키 장착!</button>
      <button id="launchBtn" class="hidden" onclick="goToScene()">🚀 출동!</button>

      <div id="keyMessage"></div>
    </section>

    <section id="sceneScreen" class="screen">
      <div class="top-info">
        <button onclick="showScreen('garageScreen')">← 차고</button>
        <div>⭐ 점수: <span id="score2">0</span></div>
      </div>

      <div id="scene">
        <div id="sceneTitle"></div>
        <div id="sceneCar"></div>
        <div id="sceneEvent"></div>
      </div>

      <div id="mathBox">
        <h2 id="missionText"></h2>
        <div id="question"></div>
        <div id="answers"></div>
      </div>

      <div id="resultText"></div>
      <button id="nextBtn" class="hidden" onclick="nextMission()">다음 미션!</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
