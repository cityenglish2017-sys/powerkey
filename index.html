<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Hero City</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🌟 Owen Hero City 🌟</h1>
      <p>Power Key Adventure</p>
    </header>

    <section id="ageScreen" class="screen active">
      <h2>나이를 선택하세요</h2>
      <button onclick="selectAge(5)">👶 5세</button>
      <button onclick="selectAge(6)">🧒 6세</button>
      <button onclick="selectAge(7)">👦 7세</button>
    </section>

    <section id="garageScreen" class="screen">
      <div class="top">
        <h2>차량을 선택하세요</h2>
        <div>⭐ <span id="scoreText">0</span></div>
      </div>
      <div id="carList" class="grid"></div>
    </section>

    <section id="keyScreen" class="screen">
      <h2 id="carTitle"></h2>
      <div id="carPreview"></div>
      <h3>파워키를 선택하세요</h3>
      <div id="keyList" class="key-row"></div>
      <p id="keyMsg">어떤 파워키를 꽂을까?</p>
      <button id="startBtn" class="hidden" onclick="startMission()">🚀 출동!</button>
    </section>

    <section id="missionScreen" class="screen">
      <div id="scene">
        <div id="sceneTitle"></div>
        <div id="heroCar"></div>
        <div id="target"></div>
      </div>

      <div id="missionBox">
        <h2 id="missionTitle"></h2>
        <div id="missionContent"></div>
        <div id="choices"></div>
      </div>

      <div id="result"></div>
      <button id="againBtn" class="hidden" onclick="retryMission()">다시 한번!</button>
      <button id="nextBtn" class="hidden" onclick="nextRound()">다음 출동!</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
