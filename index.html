<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owen Power Key Heroes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <header>
      <h1>🚨 Owen Power Key Heroes 🚨</h1>
      <p>파워키를 장착하고 수학 미션을 해결하자!</p>
    </header>

    <section id="ageScreen" class="screen active">
      <h2>난이도를 선택하세요</h2>
      <div class="button-row">
        <button onclick="selectAge(5)">5세</button>
        <button onclick="selectAge(6)">6세</button>
        <button onclick="selectAge(7)">7세</button>
      </div>
    </section>

    <section id="garageScreen" class="screen">
      <h2>출동 차량 선택</h2>
      <div id="carList" class="car-grid"></div>
    </section>

    <section id="missionScreen" class="screen">
      <div class="top-info">
        <button onclick="goGarage()">← 차고</button>
        <div>⭐ 점수: <span id="score">0</span></div>
      </div>

      <div id="city">
        <div id="eventIcon"></div>
        <div id="road">
          <div id="carStage"></div>
        </div>
      </div>

      <div id="powerKeyArea">
        <h3>파워키 장착!</h3>
        <div id="powerKey"></div>
        <button id="connectBtn" onclick="connectKey()">파워키 꽂기</button>
      </div>

      <div id="chargeArea">
        <p id="chargeText">파워키를 장착하세요!</p>
        <div class="bar">
          <div id="chargeBar"></div>
        </div>
      </div>

      <div id="mathArea" class="hidden">
        <h2 id="missionTitle"></h2>
        <div id="question"></div>
        <div id="answers"></div>
      </div>

      <button id="launchBtn" class="hidden" onclick="launchCar()">🚀 발사!</button>
      <div id="resultText"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
